<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>UnityPaint: Level 1</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h1>UnityPaint v0.2</h1>
    <p>Етап: створення прототипу</p>
    <!-- Aviket -->
    <div class="controls">
      <input
        type="color"
        id="colorPicker"
        value="#000000"
        class="tool-button"
        title="Оберіть колір"
      />
      <button id="clearBtn" title="Очистити полотно" class="tool-button">
        &#128465;
      </button>
      <input type="range" id="lineWidth" min="1" max="10" value="5" />
      <span id="sizeValue">5px</span>
    </div>

    <canvas id="board" width="500" height="400"></canvas>
    <script src="script.js"></script>
  </body>
</html>
