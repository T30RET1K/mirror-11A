<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>UnityPaint: Level 1</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <h1>UnityPaint v0.2</h1>
    <p>Етап: створення прототипу</p>
    <!-- Aviket -->
    <div class="controls">
      <button id="brushBtn" class="tool-button active" title="Пензель">
        🖌️
      </button>
      <button id="lineBtn" class="tool-button" title="Лінія">📏</button>
      <!-- azzov99 -->
      <button id="rectBtn" class="tool-button" title="Прямокутник">
        &#9645;
      </button>
      <button id="circleBtn" class="tool-button" title="Коло">&#9711;</button>
      <button id="fillBtn" class="tool-button" title="Заливка">
        &#129683;
      </button>

      <input
        type="color"
        id="colorPicker"
        value="#000000"
        class="tool-button"
        title="Оберіть колір"
      />

      <input type="range" id="lineWidth" min="1" max="10" value="5" />
      <span id="sizeValue">5px</span>
      <button id="clearBtn" title="Очистити полотно" class="tool-button">
        &#128465;
      </button>
    </div>

    <canvas id="board" width="500" height="400"></canvas>
    <script src="script.js"></script>
  </body>
</html>
